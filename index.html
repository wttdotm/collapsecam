<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collapse Cam</title>

    <meta property="og:image" content="./logo.png">
    <meta property="og:title" content="Collapse Cam">
    <meta property="og:description"
        content="NYC traffic cameras — 4th &amp; 2nd, 42nd &amp; 3rd">
    <meta property="og:url" content="https://collapsecam.wttdotm.com">

    <style>
        body {
            background-color: black;
            color: #F58426;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        h1 {
            font-size: 2em;
            font-weight: bold;
            text-align: center;
        }

        h2 {
            font-size: 1.5em;
        }

        .main {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        #logo {
            max-height: 30vh;
        }

        #description {
            max-width: 40vw;
        }

        .tabButton {
            flex: 1;
            background: #006BB6;
            color: #F58426;
            border: none;
            border-bottom: 6px solid transparent;
            font-size: 0.88em;
            padding: 10px 0;
            cursor: pointer;
            transition: border-bottom 0.15s;
        }
        .tabButton.active {
            border-bottom: 6px solid #F58426;
            font-weight: bold;
        }

        .cameraWrap {
            position: relative;
            display: inline-block;
            width: 100%;
        }

        .cameraImage {
            max-width: 100%;
        }

        .tabContent {
            padding: 5px 0;
            text-align: center;
        }

        @media (max-width: 768px) {
            #description {
                max-width: 90vw;
            }

            #logo {
                max-width: 50vw;
            }

            .tabContent h2 {
                font-size: 1.125em;
                margin-top: 0.2em;
            }
        }
    </style>
</head>

<body>
    <div class="main" id="main">
        <img id="logo" src="./logo.png" alt="CollapseCam Logo">

        <div id="description">
            <p id="byline" style="max-width: 800px; margin-bottom: 5px;">
                By <a href="https://wttdotm.com" target="_blank" rel="noopener" style="color: #F58426;">WTTDOTM</a><br>
                <span style="font-size: 0.75em;">contact: wttdotm@gmail.com</span>
            </p>
            <p style="max-width: 800px;">
                NYC traffic cameras — 4th &amp; 2nd, 42nd &amp; 3rd
            </p>
        </div>

        <div id="tabHolder" style="margin: 0 auto;">
            <div id="tabs" style="display: flex; border-bottom: 2px solid #F58426;">
                <button class="tabButton" onclick="showTab(1)" id="btnTab1">4th &amp; 2nd</button>
                <button class="tabButton" onclick="showTab(2)" id="btnTab2">42nd &amp; 3rd</button>
            </div>

            <div style="text-align: center; font-size: 0.75em; color: #F58426; padding: 4px 0;">
                collapsecam.wttdotm.com | 2s refresh rate — cams can be buggy
            </div>

            <div id="tab1" class="tabContent" style="display: block;">
                <div class="cameraWrap">
                    <img id="image1" class="cameraImage" src="https://webcams.nyctmc.org/api/cameras/8f692f55-8118-423b-8bcb-1ea49eaf442b/image" alt="4th & 2nd">
                </div>
                <h2>4th Ave &amp; 2nd St</h2>
            </div>

            <div id="tab2" class="tabContent" style="display: none;">
                <div class="cameraWrap">
                    <img id="image2" class="cameraImage" src="https://webcams.nyctmc.org/api/cameras/5352e130-4668-4be5-a7b9-9e1ce4ea6d4c/image" alt="42nd & 3rd">
                </div>
                <h2>42nd St &amp; 3rd Ave</h2>
            </div>
        </div>
    </div>

    <script>
        fetch(`https://wemakeinter.net/diyPixel/morryProjPixel.php?event=pageView&project=collapsecam`);

        const cameraUrls = {
            1: "https://webcams.nyctmc.org/api/cameras/8f692f55-8118-423b-8bcb-1ea49eaf442b/image",
            2: "https://webcams.nyctmc.org/api/cameras/5352e130-4668-4be5-a7b9-9e1ce4ea6d4c/image"
        };

        let activeTab = 1;
        let refreshTimeout = null;
        let refreshGeneration = 0;
        let currentlyLoading = false;

        function updateTabUI(tabNum) {
            for (let i = 1; i <= 2; i++) {
                document.getElementById('tab' + i).style.display = tabNum === i ? 'block' : 'none';
                document.getElementById('btnTab' + i).classList.toggle('active', tabNum === i);
            }
        }

        function showTab(tabNum) {
            activeTab = tabNum;
            updateTabUI(tabNum);
            startActiveTabPolling(true);
        }

        function startActiveTabPolling(immediate = false) {
            refreshGeneration++;
            currentlyLoading = false;

            if (refreshTimeout) {
                clearTimeout(refreshTimeout);
                refreshTimeout = null;
            }

            const myGeneration = refreshGeneration;

            const loadOnce = () => {
                if (currentlyLoading) return;

                const tabAtStart = activeTab;
                const imgEl = document.getElementById(`image${tabAtStart}`);

                if (!imgEl || !cameraUrls[tabAtStart]) return;

                currentlyLoading = true;

                const nextSrc = `${cameraUrls[tabAtStart]}?cacheAvoidance=${Date.now()}`;

                imgEl.onload = () => {
                    if (myGeneration !== refreshGeneration || tabAtStart !== activeTab) return;
                    currentlyLoading = false;
                    refreshTimeout = setTimeout(() => {
                        if (myGeneration === refreshGeneration && tabAtStart === activeTab) {
                            loadOnce();
                        }
                    }, 2000);
                };

                imgEl.onerror = () => {
                    if (myGeneration !== refreshGeneration || tabAtStart !== activeTab) return;
                    currentlyLoading = false;
                    refreshTimeout = setTimeout(() => {
                        if (myGeneration === refreshGeneration && tabAtStart === activeTab) {
                            loadOnce();
                        }
                    }, 2000);
                };

                imgEl.src = nextSrc;
            };

            if (immediate) {
                loadOnce();
            } else {
                refreshTimeout = setTimeout(loadOnce, 2000);
            }
        }

        updateTabUI(activeTab);
        startActiveTabPolling(true);
    </script>
</body>

</html>
